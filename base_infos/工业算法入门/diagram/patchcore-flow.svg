<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 470" role="img" aria-labelledby="title desc">
<title id="title">PatchCore 异常检测流程</title><desc id="desc">只用正常样本建立记忆库。新样本经过相同特征提取后，比较它和正常记忆的距离，距离大则标为异常。</desc>
<style>text{font-family:'PingFang SC','Noto Sans SC',Arial,sans-serif;fill:#1e293b}.title{font-size:26px;font-weight:800}.head{font-size:19px;font-weight:800}.body{font-size:15px;fill:#475569}.note{font-size:13px;fill:#64748b}.result{font-size:17px;font-weight:800}</style><defs><marker id="a" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0 0L10 5 0 10z" fill="#0ea5c9"/></marker></defs>
<rect width="900" height="470" rx="28" fill="#f8fafc"/><text x="450" y="52" text-anchor="middle" class="title">PatchCore：只记住“正常长什么样”</text><text x="450" y="82" text-anchor="middle" class="note">适合缺陷样本少、但正常样本很多的工业质检场景</text>
<path d="M280 190H340M560 190H620" stroke="#0ea5c9" stroke-width="4" marker-end="url(#a)"/><g><rect x="55" y="128" width="225" height="145" rx="20" fill="#ecfeff" stroke="#06b6d4" stroke-width="3"/><text x="168" y="165" text-anchor="middle" class="head" fill="#0e7490">① 提取特征</text><text x="168" y="198" text-anchor="middle" class="body">用预训练 ResNet</text><text x="168" y="222" text-anchor="middle" class="body">把正常产品拆成很多 patch 特征</text><text x="168" y="248" text-anchor="middle" class="note">骨干网络冻结，不需要从零训练</text><rect x="340" y="128" width="220" height="145" rx="20" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="3"/><text x="450" y="165" text-anchor="middle" class="head" fill="#6d28d9">② 建立记忆库</text><text x="450" y="198" text-anchor="middle" class="body">只放“正常样本”的特征</text><text x="450" y="222" text-anchor="middle" class="body">CoreSet 选代表，减少存储量</text><text x="450" y="248" text-anchor="middle" class="note">它就是模型对“正常”的记忆</text><rect x="620" y="128" width="225" height="145" rx="20" fill="#fff7ed" stroke="#f59e0b" stroke-width="3"/><text x="733" y="165" text-anchor="middle" class="head" fill="#9a4d00">③ 比较距离</text><text x="733" y="198" text-anchor="middle" class="body">新样本也转成 patch 特征</text><text x="733" y="222" text-anchor="middle" class="body">找最近的“正常记忆”</text><text x="733" y="248" text-anchor="middle" class="note">越远，越像没见过的异常</text></g>
<path d="M733 273V322" stroke="#0ea5c9" stroke-width="4" marker-end="url(#a)"/><rect x="110" y="322" width="330" height="100" rx="20" fill="#ecfdf5" stroke="#10b981" stroke-width="3"/><text x="275" y="357" text-anchor="middle" class="head" fill="#047857">距离小 → 正常</text><text x="275" y="387" text-anchor="middle" class="result" fill="#047857">异常分数 0.12 ✓</text><rect x="490" y="322" width="300" height="100" rx="20" fill="#fff1f2" stroke="#ef4444" stroke-width="3"/><text x="640" y="357" text-anchor="middle" class="head" fill="#b91c1c">距离大 → 异常</text><text x="640" y="387" text-anchor="middle" class="result" fill="#b91c1c">热图定位：哪里不对</text><text x="450" y="452" text-anchor="middle" class="note">小白记忆法：先看很多“好产品”，再找“与好产品差得很远”的地方。</text>
</svg>
