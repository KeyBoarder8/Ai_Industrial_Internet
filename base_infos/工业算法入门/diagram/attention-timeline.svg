<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 390" role="img" aria-labelledby="t d"><title id="t">注意力机制</title><desc id="d">当前时刻可直接查看多个历史时刻，线越粗代表关联越强。模型自动发现很早的微小变化可能和当前异常相关。</desc><style>text{font-family:'PingFang SC','Noto Sans SC',Arial,sans-serif;fill:#1e293b}.title{font-size:25px;font-weight:800}.h{font-size:17px;font-weight:800}.b{font-size:14px;fill:#475569}.n{font-size:13px;font-weight:800}</style><rect width="900" height="390" rx="28" fill="#f8fafc"/><text x="450" y="48" text-anchor="middle" class="title">注意力：当前异常可以直接回看所有历史时刻</text><path d="M760 147Q440 65 132 147" fill="none" stroke="#7c3aed" stroke-width="7" opacity=".8"/><path d="M760 157Q550 108 365 157" fill="none" stroke="#7c3aed" stroke-width="4" opacity=".65"/><path d="M760 167Q665 138 600 167" fill="none" stroke="#7c3aed" stroke-width="3" opacity=".45"/><text x="430" y="92" text-anchor="middle" class="n" fill="#6d28d9">高关注：3 小时前的微小变化</text><g text-anchor="middle"><circle cx="125" cy="175" r="34" fill="#fff" stroke="#8b5cf6" stroke-width="3"/><text x="125" y="181" class="h" fill="#6d28d9">t₁</text><text x="125" y="235" class="b">3 小时前</text><circle cx="360" cy="175" r="34" fill="#fff" stroke="#8b5cf6" stroke-width="3"/><text x="360" y="181" class="h" fill="#6d28d9">t₃</text><text x="360" y="235" class="b">1 小时前</text><circle cx="595" cy="175" r="34" fill="#fff" stroke="#8b5cf6" stroke-width="3"/><text x="595" y="181" class="h" fill="#6d28d9">t₄</text><text x="595" y="235" class="b">30 分钟前</text><circle cx="760" cy="175" r="40" fill="#fff1f2" stroke="#ef4444" stroke-width="4"/><text x="760" y="181" class="h" fill="#b91c1c">t₅</text><text x="760" y="243" class="b" fill="#b91c1c">当前异常</text></g><rect x="140" y="285" width="620" height="58" rx="16" fill="#f5f3ff" stroke="#c4b5fd"/><text x="450" y="312" text-anchor="middle" class="h" fill="#6d28d9">线越粗 = 这段历史和当前越相关</text><text x="450" y="334" text-anchor="middle" class="b">不像 LSTM 必须一步步传话，Transformer 可以“跨很远直接看”。</text></svg>
