<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" role="img" aria-labelledby="title desc">
<title id="title">反向传播：数据向前、误差向后</title><desc id="desc">神经网络的输入层、两个隐藏层和输出层。顶部数据从左到右流动，底部误差从右到左回传以更新权重。</desc>
<style>text{font-family:'PingFang SC','Noto Sans SC',Arial,sans-serif;fill:#1e293b}.title{font-size:26px;font-weight:800}.small{font-size:15px;fill:#64748b}.box{fill:#fff;stroke-width:3}.name{font-size:20px;font-weight:800}.hint{font-size:14px;fill:#64748b}.label{font-size:15px;font-weight:700}.formula{font:700 17px ui-monospace,SFMono-Regular,Menlo,monospace;fill:#9a4d00}</style>
<defs><marker id="gray" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0 0L10 5 0 10z" fill="#94a3b8"/></marker><marker id="red" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0 0L10 5 0 10z" fill="#dc2626"/></marker></defs>
<rect width="900" height="480" rx="28" fill="#f8fafc"/><text x="450" y="54" text-anchor="middle" class="title">反向传播：先算结果，再把误差传回去</text><text x="450" y="84" text-anchor="middle" class="small">把它想成射箭复盘：知道偏了多少，才知道下一箭该怎样调整</text>
<text x="450" y="130" text-anchor="middle" class="label" fill="#475569">① 前向传播：数据从左到右，得到预测</text>
<path d="M190 210H310M400 210H520M610 210H730" stroke="#94a3b8" stroke-width="4" fill="none" marker-end="url(#gray)"/>
<g><rect x="80" y="170" width="110" height="80" rx="16" class="box" stroke="#d97706"/><text x="135" y="207" text-anchor="middle" class="name" fill="#9a4d00">输入层</text><text x="135" y="230" text-anchor="middle" class="hint">传感器数据</text><rect x="310" y="170" width="90" height="80" rx="16" class="box" stroke="#2563eb"/><text x="355" y="215" text-anchor="middle" class="name" fill="#1d4ed8">隐藏层 1</text><rect x="520" y="170" width="90" height="80" rx="16" class="box" stroke="#7c3aed"/><text x="565" y="215" text-anchor="middle" class="name" fill="#6d28d9">隐藏层 2</text><rect x="730" y="170" width="100" height="80" rx="16" class="box" stroke="#059669"/><text x="780" y="204" text-anchor="middle" class="name" fill="#047857">输出</text><text x="780" y="230" text-anchor="middle" class="hint">异常概率 0.87</text></g>
<path d="M780 250V292" stroke="#dc2626" stroke-width="3" stroke-dasharray="7 6"/><rect x="685" y="292" width="190" height="72" rx="16" fill="#fff1f2" stroke="#dc2626" stroke-width="3"/><text x="780" y="322" text-anchor="middle" class="name" fill="#b91c1c">误差 = 0.13</text><text x="780" y="348" text-anchor="middle" class="hint">预测 0.87，真实 1.00</text>
<text x="450" y="402" text-anchor="middle" class="label" fill="#b91c1c">② 反向传播：误差从右到左，逐层微调权重</text><path d="M730 384H610M520 384H400M310 384H190" stroke="#dc2626" stroke-width="4" fill="none" marker-end="url(#red)"/><text x="670" y="375" text-anchor="middle" class="hint" fill="#b91c1c">调整 w₃</text><text x="460" y="375" text-anchor="middle" class="hint" fill="#b91c1c">调整 w₂</text><text x="250" y="375" text-anchor="middle" class="hint" fill="#b91c1c">调整 w₁</text><rect x="170" y="424" width="560" height="38" rx="10" fill="#fff7ed" stroke="#fed7aa"/><text x="450" y="450" text-anchor="middle" class="formula">新权重 = 旧权重 − 学习率 × 误差对权重的影响</text>
</svg>
