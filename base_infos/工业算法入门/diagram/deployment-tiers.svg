<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 470" role="img" aria-labelledby="t d"><title id="t">工业 AI 三层部署</title><desc id="d">相机内嵌、边缘计算盒和云端 GPU 是三种不同的部署位置，延迟、算力和成本依次升高，适用场景也不同。</desc><style>text{font-family:'PingFang SC','Noto Sans SC',Arial,sans-serif;fill:#172033}.title{font-size:25px;font-weight:800}.h{font-size:19px;font-weight:800}.b{font-size:14px;fill:#526176}.tag{font-size:14px;font-weight:800}</style><defs><marker id="a" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0 0L10 5 0 10z" fill="#94a3b8"/></marker></defs><rect width="900" height="470" rx="28" fill="#f8fafc"/><text x="450" y="48" text-anchor="middle" class="title">部署位置怎么选：离现场越近，越快；离现场越远，越强</text><path d="M293 220H342M558 220H607" stroke="#94a3b8" stroke-width="4" marker-end="url(#a)"/><g><rect x="45" y="88" width="248" height="294" rx="22" fill="#ecfdf5" stroke="#10b981" stroke-width="3"/><text x="169" y="126" text-anchor="middle" class="h" fill="#047857">摄像头内嵌</text><text x="169" y="158" text-anchor="middle" class="b">ISP / 小型 SoC</text><rect x="75" y="182" width="188" height="46" rx="12" fill="#fff" stroke="#bbf7d0"/><text x="169" y="211" text-anchor="middle" class="tag" fill="#047857">延迟 &lt; 5 ms</text><rect x="75" y="242" width="188" height="46" rx="12" fill="#fff" stroke="#bbf7d0"/><text x="169" y="271" text-anchor="middle" class="tag">MobileNet / NanoDet</text><text x="169" y="326" text-anchor="middle" class="b">适合：单路相机、</text><text x="169" y="348" text-anchor="middle" class="b">超低延迟在线质检</text><rect x="342" y="88" width="216" height="294" rx="22" fill="#fff7ed" stroke="#f59e0b" stroke-width="3"/><text x="450" y="126" text-anchor="middle" class="h" fill="#9a4d00">边缘计算盒</text><text x="450" y="158" text-anchor="middle" class="b">Jetson / Atlas / RK3588</text><rect x="372" y="182" width="156" height="46" rx="12" fill="#fff" stroke="#fed7aa"/><text x="450" y="211" text-anchor="middle" class="tag" fill="#9a4d00">10–50 ms</text><rect x="372" y="242" width="156" height="46" rx="12" fill="#fff" stroke="#fed7aa"/><text x="450" y="271" text-anchor="middle" class="tag">YOLOv8 / ResNet</text><text x="450" y="326" text-anchor="middle" class="b">适合：多路相机、</text><text x="450" y="348" text-anchor="middle" class="b">主流工业视觉任务</text><rect x="607" y="88" width="248" height="294" rx="22" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="3"/><text x="731" y="126" text-anchor="middle" class="h" fill="#6d28d9">云端 GPU</text><text x="731" y="158" text-anchor="middle" class="b">A100 / V100 集群</text><rect x="637" y="182" width="188" height="46" rx="12" fill="#fff" stroke="#ddd6fe"/><text x="731" y="211" text-anchor="middle" class="tag" fill="#6d28d9">100 ms–秒级</text><rect x="637" y="242" width="188" height="46" rx="12" fill="#fff" stroke="#ddd6fe"/><text x="731" y="271" text-anchor="middle" class="tag">大模型训练 / 推理</text><text x="731" y="326" text-anchor="middle" class="b">适合：集中训练、</text><text x="731" y="348" text-anchor="middle" class="b">复杂模型和跨厂分析</text></g><text x="450" y="424" text-anchor="middle" class="b">推荐起步：多数现场先用“边缘计算盒”，在速度、成本和维护之间最均衡。</text></svg>
