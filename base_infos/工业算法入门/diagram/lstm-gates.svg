<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" role="img" aria-labelledby="title desc">
<title id="title">LSTM：信息高速公路和三个门</title><desc id="desc">遗忘门决定删掉多少旧信息，输入门决定写入多少新信息，输出门决定读出什么。Cell State 是贯穿全图的信息高速公路。</desc>
<style>text{font-family:'PingFang SC','Noto Sans SC',Arial,sans-serif;fill:#1e293b}.title{font-size:26px;font-weight:800}.head{font-size:19px;font-weight:800}.body{font-size:14px;fill:#475569}.tag{font-size:15px;font-weight:700}.small{font-size:13px;fill:#64748b}</style><defs><marker id="orange" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0 0L10 5 0 10z" fill="#d97706"/></marker><marker id="violet" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0 0L10 5 0 10z" fill="#7c3aed"/></marker></defs>
<rect width="900" height="500" rx="28" fill="#f8fafc"/><text x="450" y="50" text-anchor="middle" class="title">LSTM：一条信息高速公路，三个可控的“匝道”</text><text x="450" y="80" text-anchor="middle" class="small">适合温度、振动等会慢慢变化、需要记住长期趋势的时序数据</text>
<path d="M80 144H820" stroke="#d97706" stroke-width="7" fill="none" marker-end="url(#orange)"/><text x="95" y="123" class="tag" fill="#9a4d00">上一时刻记忆 Cₜ₋₁</text><text x="750" y="123" class="tag" fill="#9a4d00">新记忆 Cₜ</text><rect x="328" y="95" width="244" height="38" rx="12" fill="#fff7ed" stroke="#f59e0b"/><text x="450" y="120" text-anchor="middle" class="tag" fill="#9a4d00">Cell State = 信息高速公路</text>
<g><rect x="104" y="205" width="190" height="130" rx="20" fill="#fff1f2" stroke="#ef4444" stroke-width="3"/><text x="199" y="244" text-anchor="middle" class="head" fill="#b91c1c">① 遗忘门 f</text><text x="199" y="274" text-anchor="middle" class="body">哪些旧信息该删？</text><text x="199" y="303" text-anchor="middle" class="small">0 = 全删 · 1 = 全留</text><rect x="355" y="205" width="190" height="130" rx="20" fill="#ecfdf5" stroke="#10b981" stroke-width="3"/><text x="450" y="244" text-anchor="middle" class="head" fill="#047857">② 输入门 i</text><text x="450" y="274" text-anchor="middle" class="body">哪些新信息该写？</text><text x="450" y="303" text-anchor="middle" class="small">把候选信息写进 Cₜ</text><rect x="606" y="205" width="190" height="130" rx="20" fill="#eff6ff" stroke="#2563eb" stroke-width="3"/><text x="701" y="244" text-anchor="middle" class="head" fill="#1d4ed8">③ 输出门 o</text><text x="701" y="274" text-anchor="middle" class="body">现在该读出什么？</text><text x="701" y="303" text-anchor="middle" class="small">生成当前隐藏状态 hₜ</text></g>
<path d="M199 205V152M450 205V152M701 205V152" stroke="#64748b" stroke-width="3" stroke-dasharray="7 6"/><text x="199" y="178" text-anchor="middle" class="tag" fill="#b91c1c">删旧</text><text x="450" y="178" text-anchor="middle" class="tag" fill="#047857">写新</text><text x="701" y="178" text-anchor="middle" class="tag" fill="#1d4ed8">读出</text>
<path d="M450 335V386H788" stroke="#7c3aed" stroke-width="4" fill="none" marker-end="url(#violet)"/><text x="798" y="390" class="tag" fill="#6d28d9">当前输出 hₜ</text><rect x="150" y="400" width="520" height="60" rx="16" fill="#f5f3ff" stroke="#c4b5fd"/><text x="410" y="427" text-anchor="middle" class="head" fill="#6d28d9">一句话理解</text><text x="410" y="449" text-anchor="middle" class="body">遗忘门负责“删旧”，输入门负责“加新”，输出门负责“读出”。</text>
</svg>
