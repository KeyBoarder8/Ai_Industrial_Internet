<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 410" role="img" aria-labelledby="t d"><title id="t">梯度提升原理</title><desc id="d">第一棵树先做一个粗略预测，第二和第三棵树依次学习前一轮没有预测好的残差，所有树的预测相加形成最终结果。</desc><style>text{font-family:'PingFang SC','Noto Sans SC',Arial,sans-serif;fill:#172033}.title{font-size:25px;font-weight:800}.h{font-size:18px;font-weight:800}.b{font-size:14px;fill:#526176}.s{font-size:13px;font-weight:700}</style><defs><linearGradient id="g" x1="0" x2="1"><stop stop-color="#eff6ff"/><stop offset="1" stop-color="#f5f3ff"/></linearGradient><marker id="a" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0 0L10 5 0 10z" fill="#64748b"/></marker></defs><rect width="900" height="410" rx="28" fill="#f8fafc"/><text x="450" y="48" text-anchor="middle" class="title">梯度提升：后一棵树专门修前一棵树没做好的部分</text><path d="M245 176H305M445 176H505M645 176H705" fill="none" stroke="#94a3b8" stroke-width="4" marker-end="url(#a)"/><g><rect x="70" y="112" width="175" height="130" rx="18" fill="#eff6ff" stroke="#2563eb" stroke-width="3"/><text x="157" y="150" text-anchor="middle" class="h" fill="#1d4ed8">① 原始数据 y</text><text x="157" y="182" text-anchor="middle" class="b">真实能耗 / 质量值</text><text x="157" y="208" text-anchor="middle" class="s" fill="#1d4ed8">先给树 1 学</text><rect x="305" y="112" width="140" height="130" rx="18" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="3"/><text x="375" y="150" text-anchor="middle" class="h" fill="#6d28d9">② 树 1</text><text x="375" y="182" text-anchor="middle" class="b">先做粗预测 ŷ₁</text><text x="375" y="208" text-anchor="middle" class="s" fill="#b91c1c">留下残差 r₁</text><rect x="505" y="112" width="140" height="130" rx="18" fill="#fff7ed" stroke="#f59e0b" stroke-width="3"/><text x="575" y="150" text-anchor="middle" class="h" fill="#9a4d00">③ 树 2</text><text x="575" y="182" text-anchor="middle" class="b">只学习 r₁</text><text x="575" y="208" text-anchor="middle" class="s" fill="#b91c1c">留下更小 r₂</text><rect x="705" y="112" width="125" height="130" rx="18" fill="#ecfdf5" stroke="#10b981" stroke-width="3"/><text x="767" y="150" text-anchor="middle" class="h" fill="#047857">④ 树 3…</text><text x="767" y="182" text-anchor="middle" class="b">继续修残差</text><text x="767" y="208" text-anchor="middle" class="s" fill="#047857">越修越准</text></g><rect x="150" y="288" width="600" height="70" rx="18" fill="url(#g)" stroke="#d8b4fe" stroke-width="2"/><text x="450" y="320" text-anchor="middle" class="h" fill="#6d28d9">最终预测 = ŷ₁ + ŷ₂ + ŷ₃ + …</text><text x="450" y="344" text-anchor="middle" class="b">不是每棵树重新学一遍，而是每一棵树都专注修补“上一轮的误差”。</text></svg>
