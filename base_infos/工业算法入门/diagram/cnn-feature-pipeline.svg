<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 390" role="img" aria-labelledby="t d"><title id="t">CNN 特征提取流程</title><desc id="d">一张工业零件图像经过卷积和池化，逐步从边缘、纹理理解到零件与缺陷，最后得到分类结果。</desc><style>text{font-family:'PingFang SC','Noto Sans SC',Arial,sans-serif;fill:#1e293b}.title{font-size:25px;font-weight:800}.h{font-size:18px;font-weight:800}.b{font-size:14px;fill:#475569}.n{font-size:13px;font-weight:800}</style><defs><marker id="a" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0 0L10 5 0 10z" fill="#64748b"/></marker></defs><rect width="900" height="390" rx="28" fill="#f8fafc"/><text x="450" y="48" text-anchor="middle" class="title">CNN：从“像素”逐步看懂“缺陷”</text><path d="M185 182H245M395 182H455M605 182H665" stroke="#64748b" stroke-width="4" marker-end="url(#a)"/><g><rect x="40" y="120" width="145" height="124" rx="18" fill="#eff6ff" stroke="#2563eb" stroke-width="3"/><text x="112" y="158" text-anchor="middle" class="h" fill="#1d4ed8">① 原始图像</text><text x="112" y="190" text-anchor="middle" class="b">零件表面照片</text><text x="112" y="214" text-anchor="middle" class="b">每个点只是像素</text><rect x="245" y="120" width="150" height="124" rx="18" fill="#ecfeff" stroke="#06b6d4" stroke-width="3"/><text x="320" y="158" text-anchor="middle" class="h" fill="#0e7490">② 卷积</text><text x="320" y="190" text-anchor="middle" class="b">找边缘、线条</text><text x="320" y="214" text-anchor="middle" class="b">和局部纹理</text><rect x="455" y="120" width="150" height="124" rx="18" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="3"/><text x="530" y="158" text-anchor="middle" class="h" fill="#6d28d9">③ 池化 + 叠层</text><text x="530" y="190" text-anchor="middle" class="b">保留重要特征</text><text x="530" y="214" text-anchor="middle" class="b">忽略细小噪声</text><rect x="665" y="120" width="190" height="124" rx="18" fill="#ecfdf5" stroke="#10b981" stroke-width="3"/><text x="760" y="158" text-anchor="middle" class="h" fill="#047857">④ 分类 / 检测</text><text x="760" y="190" text-anchor="middle" class="b">这是不是划痕？</text><text x="760" y="214" text-anchor="middle" class="b">缺陷在哪里？</text></g><rect x="125" y="286" width="650" height="54" rx="16" fill="#fff7ed" stroke="#fed7aa"/><text x="450" y="320" text-anchor="middle" class="n" fill="#9a4d00">小白记忆：越往后，模型越不关心“一个像素”，越关心“这块零件到底有没有问题”。</text></svg>
