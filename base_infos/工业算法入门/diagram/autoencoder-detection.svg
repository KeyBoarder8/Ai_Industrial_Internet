<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 470" role="img" aria-labelledby="title desc">
<title id="title">Autoencoder 异常检测</title><desc id="desc">将正常振动信号压缩到小的隐空间后再重建。新信号无法重建好时，重建误差超过阈值并被判断为异常。</desc>
<style>text{font-family:'PingFang SC','Noto Sans SC',Arial,sans-serif;fill:#1e293b}.title{font-size:26px;font-weight:800}.head{font-size:19px;font-weight:800}.body{font-size:15px;fill:#475569}.note{font-size:13px;fill:#64748b}.result{font-size:17px;font-weight:800}</style><defs><marker id="a" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0 0L10 5 0 10z" fill="#64748b"/></marker></defs>
<rect width="900" height="470" rx="28" fill="#f8fafc"/><text x="450" y="52" text-anchor="middle" class="title">Autoencoder：只学会“正常怎么重建”</text><text x="450" y="82" text-anchor="middle" class="note">新信号重建得越差，越可能不是模型熟悉的正常模式</text>
<path d="M220 205H292M448 205H520M676 205H748" stroke="#64748b" stroke-width="4" marker-end="url(#a)"/><g><rect x="54" y="142" width="166" height="126" rx="20" fill="#eff6ff" stroke="#2563eb" stroke-width="3"/><text x="137" y="180" text-anchor="middle" class="head" fill="#1d4ed8">① 输入信号 x</text><text x="137" y="211" text-anchor="middle" class="body">512 步振动序列</text><text x="137" y="238" text-anchor="middle" class="note">正常设备的历史数据</text><rect x="292" y="142" width="156" height="126" rx="20" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="3"/><text x="370" y="180" text-anchor="middle" class="head" fill="#6d28d9">② Encoder</text><text x="370" y="211" text-anchor="middle" class="body">512 → 128 → 16</text><text x="370" y="238" text-anchor="middle" class="note">压缩成关键特征 z</text><rect x="520" y="142" width="156" height="126" rx="20" fill="#ecfdf5" stroke="#10b981" stroke-width="3"/><text x="598" y="180" text-anchor="middle" class="head" fill="#047857">③ Decoder</text><text x="598" y="211" text-anchor="middle" class="body">16 → 128 → 512</text><text x="598" y="238" text-anchor="middle" class="note">尝试还原原始信号</text><rect x="748" y="142" width="110" height="126" rx="20" fill="#ecfdf5" stroke="#059669" stroke-width="3"/><text x="803" y="180" text-anchor="middle" class="head" fill="#047857">重建 x̂</text><text x="803" y="211" text-anchor="middle" class="body">模型的“正常猜测”</text></g>
<path d="M803 268V320" stroke="#ef4444" stroke-width="4" marker-end="url(#a)"/><rect x="560" y="320" width="270" height="92" rx="20" fill="#fff1f2" stroke="#ef4444" stroke-width="3"/><text x="695" y="354" text-anchor="middle" class="head" fill="#b91c1c">④ 计算重建误差 e</text><text x="695" y="383" text-anchor="middle" class="body">e = 原始信号 x 与重建信号 x̂ 的差</text><rect x="72" y="320" width="400" height="92" rx="20" fill="#fff7ed" stroke="#f59e0b" stroke-width="3"/><text x="272" y="354" text-anchor="middle" class="head" fill="#9a4d00">⑤ 与阈值比较</text><text x="272" y="383" text-anchor="middle" class="result" fill="#047857">误差小 → 正常</text><text x="272" y="405" text-anchor="middle" class="result" fill="#b91c1c">误差大 → 异常，触发复核</text><path d="M560 366H472" stroke="#ef4444" stroke-width="4" marker-end="url(#a)"/>
<text x="450" y="448" text-anchor="middle" class="note">小白记忆法：模型只学“好设备的声音”；学不会复原的声音，就值得进一步检查。</text>
</svg>
