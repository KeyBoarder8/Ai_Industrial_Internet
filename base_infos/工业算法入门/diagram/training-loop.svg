<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 390" role="img" aria-labelledby="t d"><title id="t">模型训练循环</title><desc id="d">数据进入模型获得预测，预测和真实答案比较得到误差，误差反向传播更新模型，然后开始下一轮。</desc><style>text{font-family:'PingFang SC','Noto Sans SC',Arial,sans-serif;fill:#1e293b}.title{font-size:25px;font-weight:800}.h{font-size:18px;font-weight:800}.b{font-size:14px;fill:#475569}.n{font-size:13px;font-weight:800}</style><defs><marker id="a" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0 0L10 5 0 10z" fill="#64748b"/></marker></defs><rect width="900" height="390" rx="28" fill="#f8fafc"/><text x="450" y="48" text-anchor="middle" class="title">训练循环：每次都比上一次“猜得更接近”</text><path d="M205 180H270M420 180H485M635 180H700M765 238V290H135V238" fill="none" stroke="#64748b" stroke-width="4" marker-end="url(#a)"/><g><rect x="55" y="126" width="150" height="108" rx="18" fill="#eff6ff" stroke="#2563eb" stroke-width="3"/><text x="130" y="164" text-anchor="middle" class="h" fill="#1d4ed8">① 喂数据</text><text x="130" y="192" text-anchor="middle" class="b">历史传感器数据</text><text x="130" y="214" text-anchor="middle" class="b">+ 正确答案</text><rect x="270" y="126" width="150" height="108" rx="18" fill="#ecfeff" stroke="#06b6d4" stroke-width="3"/><text x="345" y="164" text-anchor="middle" class="h" fill="#0e7490">② 前向计算</text><text x="345" y="192" text-anchor="middle" class="b">模型给出预测</text><text x="345" y="214" text-anchor="middle" class="b">例如：异常 0.87</text><rect x="485" y="126" width="150" height="108" rx="18" fill="#fff7ed" stroke="#f59e0b" stroke-width="3"/><text x="560" y="164" text-anchor="middle" class="h" fill="#9a4d00">③ 算误差</text><text x="560" y="192" text-anchor="middle" class="b">预测 vs 正确答案</text><text x="560" y="214" text-anchor="middle" class="b">差多少？</text><rect x="700" y="126" width="150" height="108" rx="18" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="3"/><text x="775" y="164" text-anchor="middle" class="h" fill="#6d28d9">④ 调整模型</text><text x="775" y="192" text-anchor="middle" class="b">误差反向回传</text><text x="775" y="214" text-anchor="middle" class="b">微调权重</text></g><rect x="230" y="282" width="440" height="60" rx="16" fill="#ecfdf5" stroke="#10b981" stroke-width="2"/><text x="450" y="308" text-anchor="middle" class="h" fill="#047857">⑤ 重复很多轮</text><text x="450" y="330" text-anchor="middle" class="b">直到验证集表现稳定，才进入部署与现场复核</text></svg>
