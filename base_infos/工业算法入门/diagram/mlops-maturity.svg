<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 410" role="img" aria-labelledby="t d"><title id="t">MLOps 成熟度阶梯</title><desc id="d">MLOps 从手动训练部署的 Level 0，升级到可复现和模型注册的 Level 1，最后进入自动训练、测试和灰度发布的 Level 2。</desc><style>text{font-family:'PingFang SC','Noto Sans SC',Arial,sans-serif;fill:#172033}.title{font-size:25px;font-weight:800}.h{font-size:20px;font-weight:800}.b{font-size:14px;fill:#526176}.tag{font-size:14px;font-weight:800}</style><defs><marker id="a" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0 0L10 5 0 10z" fill="#f43f5e"/></marker></defs><rect width="900" height="410" rx="28" fill="#f8fafc"/><text x="450" y="48" text-anchor="middle" class="title">MLOps 成熟度：先可复现，再自动化，最后可控上线</text><path d="M250 286L330 206M530 206L610 126" stroke="#f43f5e" stroke-width="5" fill="none" marker-end="url(#a)"/><g><rect x="70" y="230" width="180" height="100" rx="20" fill="#fff" stroke="#94a3b8" stroke-width="3"/><text x="160" y="267" text-anchor="middle" class="h" fill="#475569">Level 0</text><text x="160" y="294" text-anchor="middle" class="tag">手动一切</text><text x="160" y="316" text-anchor="middle" class="b">脚本训练 · 人工部署</text><rect x="330" y="150" width="200" height="100" rx="20" fill="#fff7ed" stroke="#f59e0b" stroke-width="3"/><text x="430" y="187" text-anchor="middle" class="h" fill="#9a4d00">Level 1</text><text x="430" y="214" text-anchor="middle" class="tag">可复现</text><text x="430" y="236" text-anchor="middle" class="b">实验追踪 · 模型注册</text><rect x="610" y="70" width="220" height="100" rx="20" fill="#fff1f2" stroke="#f43f5e" stroke-width="3"/><text x="720" y="107" text-anchor="middle" class="h" fill="#be123c">Level 2</text><text x="720" y="134" text-anchor="middle" class="tag">持续交付</text><text x="720" y="156" text-anchor="middle" class="b">自动训练 · 测试 · 灰度发布</text></g><rect x="155" y="352" width="590" height="34" rx="12" fill="#fff1f2" stroke="#fecdd3"/><text x="450" y="375" text-anchor="middle" class="tag" fill="#be123c">工厂建议：先做到 Level 1；当数据闭环稳定后，再逐步迈向 Level 2。</text></svg>
