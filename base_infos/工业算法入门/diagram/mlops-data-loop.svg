<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 410" role="img" aria-labelledby="t d"><title id="t">工业 AI 数据闭环</title><desc id="d">模型在产线推理后，记录人工复核、异常样本和质量结果，定期进入数据治理与重训练，再部署新模型。</desc><style>text{font-family:'PingFang SC','Noto Sans SC',Arial,sans-serif;fill:#1e293b}.title{font-size:25px;font-weight:800}.h{font-size:18px;font-weight:800}.b{font-size:14px;fill:#475569}</style><defs><marker id="a" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0 0L10 5 0 10z" fill="#64748b"/></marker></defs><rect width="900" height="410" rx="28" fill="#f8fafc"/><text x="450" y="48" text-anchor="middle" class="title">模型上线不是终点：工业 AI 必须持续“保鲜”</text><path d="M230 172H315M465 172H550M700 172V258H450" fill="none" stroke="#64748b" stroke-width="4" marker-end="url(#a)"/><path d="M450 258H200V230" fill="none" stroke="#64748b" stroke-width="4" marker-end="url(#a)"/><g><rect x="80" y="110" width="150" height="120" rx="18" fill="#eff6ff" stroke="#2563eb" stroke-width="3"/><text x="155" y="150" text-anchor="middle" class="h" fill="#1d4ed8">① 现场推理</text><text x="155" y="180" text-anchor="middle" class="b">相机 / 传感器</text><text x="155" y="205" text-anchor="middle" class="b">模型给出建议</text><rect x="315" y="110" width="150" height="120" rx="18" fill="#fff7ed" stroke="#f59e0b" stroke-width="3"/><text x="390" y="150" text-anchor="middle" class="h" fill="#9a4d00">② 人工复核</text><text x="390" y="180" text-anchor="middle" class="b">确认误报 / 漏报</text><text x="390" y="205" text-anchor="middle" class="b">记录真实结果</text><rect x="550" y="110" width="150" height="120" rx="18" fill="#ecfdf5" stroke="#10b981" stroke-width="3"/><text x="625" y="150" text-anchor="middle" class="h" fill="#047857">③ 收集新样本</text><text x="625" y="180" text-anchor="middle" class="b">难例、异常、漂移</text><text x="625" y="205" text-anchor="middle" class="b">进入训练数据池</text><rect x="260" y="270" width="380" height="80" rx="18" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="3"/><text x="450" y="306" text-anchor="middle" class="h" fill="#6d28d9">④ 治理、评估、重训练</text><text x="450" y="332" text-anchor="middle" class="b">新模型通过验证后，再灰度部署回产线</text></g><text x="450" y="382" text-anchor="middle" class="b">关键边界：模型“建议”，人和安全逻辑保留最终控制权。</text></svg>
