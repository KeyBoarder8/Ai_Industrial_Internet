<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" role="img" aria-labelledby="title desc">
<title id="title">U-Net：压缩、跳连、还原</title><desc id="desc">U-Net 包含左侧编码器、中央瓶颈、右侧解码器，以及三条跳跃连接。底部展示从原图到缺陷掩码再到测量结果的输出过程。</desc>
<style>text{font-family:'PingFang SC','Noto Sans SC',Arial,sans-serif;fill:#1e293b}.title{font-size:25px;font-weight:800}.group{font-size:18px;font-weight:800}.node{font-size:16px;font-weight:800}.sub{font-size:13px;fill:#64748b}.tag{font-size:13px;font-weight:700}</style>
<defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0 0L10 5 0 10z" fill="#0ea5c9"/></marker><marker id="skip" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0 0L10 5 0 10z" fill="#d97706"/></marker></defs><rect width="900" height="520" rx="28" fill="#f8fafc"/><text x="450" y="48" text-anchor="middle" class="title">U-Net：先“看懂”全局，再“找回”每个像素的细节</text>
<rect x="48" y="86" width="314" height="228" rx="24" fill="#ecfeff" stroke="#22d3ee" stroke-width="2"/><text x="205" y="116" text-anchor="middle" class="group" fill="#0e7490">编码器：压缩提炼</text><rect x="540" y="86" width="312" height="228" rx="24" fill="#ecfdf5" stroke="#34d399" stroke-width="2"/><text x="696" y="116" text-anchor="middle" class="group" fill="#047857">解码器：扩张还原</text>
<g fill="#fff" stroke-width="3"><rect x="80" y="156" width="92" height="74" rx="14" stroke="#06b6d4"/><rect x="220" y="184" width="92" height="74" rx="14" stroke="#06b6d4"/><rect x="404" y="212" width="92" height="74" rx="14" stroke="#d97706"/><rect x="588" y="184" width="92" height="74" rx="14" stroke="#059669"/><rect x="728" y="156" width="92" height="74" rx="14" stroke="#059669"/></g>
<g text-anchor="middle"><text x="126" y="188" class="node" fill="#0e7490">卷积</text><text x="126" y="212" class="sub">256 × 256</text><text x="266" y="216" class="node" fill="#0e7490">池化</text><text x="266" y="240" class="sub">128 × 128</text><text x="450" y="244" class="node" fill="#9a4d00">瓶颈</text><text x="450" y="268" class="sub">最浓缩的特征</text><text x="634" y="216" class="node" fill="#047857">上采样</text><text x="634" y="240" class="sub">128 × 128</text><text x="774" y="188" class="node" fill="#047857">卷积</text><text x="774" y="212" class="sub">256 × 256</text></g>
<path d="M172 193H220M312 221H404M496 249H588M680 221H728" stroke="#0ea5c9" stroke-width="4" fill="none" marker-end="url(#arrow)"/><path d="M126 230V292H634V258M266 258V304H774V230" stroke="#d97706" stroke-width="3" stroke-dasharray="8 6" fill="none" marker-end="url(#skip)"/><text x="362" y="288" class="tag" fill="#9a4d00">跳跃连接：把早期细节直接交给解码器</text>
<rect x="70" y="358" width="760" height="116" rx="20" fill="#fff" stroke="#cbd5e1" stroke-width="2"/><text x="450" y="390" text-anchor="middle" class="group">输出：从“哪里不对”到“缺陷有多大”</text><g text-anchor="middle"><rect x="102" y="410" width="130" height="42" rx="10" fill="#f8fafc" stroke="#94a3b8"/><text x="167" y="437" class="tag">原始图像</text><path d="M232 431H302" stroke="#94a3b8" stroke-width="3" marker-end="url(#arrow)"/><rect x="312" y="410" width="140" height="42" rx="10" fill="#f5f3ff" stroke="#8b5cf6"/><text x="382" y="437" class="tag" fill="#6d28d9">像素级缺陷掩码</text><path d="M452 431H522" stroke="#94a3b8" stroke-width="3" marker-end="url(#arrow)"/><rect x="532" y="410" width="230" height="42" rx="10" fill="#ecfeff" stroke="#06b6d4"/><text x="647" y="437" class="tag" fill="#0e7490">面积 2.3 mm² · 裂纹 5.1 mm</text></g>
</svg>
