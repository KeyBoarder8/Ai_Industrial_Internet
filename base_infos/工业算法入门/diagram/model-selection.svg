<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" role="img" aria-labelledby="t d"><title id="t">工业算法选型路径</title><desc id="d">先按数据类型选择视觉、时序或表格路线；时序任务根据故障样本是否足够选择监督预测或异常检测；最后按实时性和可解释性决定部署方式。</desc><style>text{font-family:'PingFang SC','Noto Sans SC',Arial,sans-serif;fill:#172033}.title{font-size:25px;font-weight:800}.h{font-size:18px;font-weight:800}.b{font-size:14px;fill:#526176}.tag{font-size:13px;font-weight:800}</style><defs><marker id="a" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0 0L10 5 0 10z" fill="#64748b"/></marker></defs><rect width="900" height="500" rx="28" fill="#f8fafc"/><text x="450" y="48" text-anchor="middle" class="title">算法选型：先看数据，再看样本，最后看交付边界</text><rect x="315" y="78" width="270" height="58" rx="18" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="3"/><text x="450" y="114" text-anchor="middle" class="h" fill="#6d28d9">① 你的数据长什么样？</text><path d="M450 136V166H170M450 166H450M450 166H730" fill="none" stroke="#94a3b8" stroke-width="3" marker-end="url(#a)"/><g><rect x="55" y="184" width="230" height="90" rx="18" fill="#eff6ff" stroke="#2563eb" stroke-width="3"/><text x="170" y="219" text-anchor="middle" class="h" fill="#1d4ed8">图像 / 视频</text><text x="170" y="248" text-anchor="middle" class="b">CNN · YOLO · ViT · U-Net</text><rect x="335" y="184" width="230" height="90" rx="18" fill="#ecfdf5" stroke="#10b981" stroke-width="3"/><text x="450" y="219" text-anchor="middle" class="h" fill="#047857">时序信号</text><text x="450" y="248" text-anchor="middle" class="b">振动 · 温度 · 压力 · 能耗</text><rect x="615" y="184" width="230" height="90" rx="18" fill="#fff7ed" stroke="#f59e0b" stroke-width="3"/><text x="730" y="219" text-anchor="middle" class="h" fill="#9a4d00">表格数据</text><text x="730" y="248" text-anchor="middle" class="b">优先 LightGBM + SHAP</text></g><path d="M450 274V310" stroke="#10b981" stroke-width="4" marker-end="url(#a)"/><rect x="315" y="310" width="270" height="58" rx="18" fill="#fff" stroke="#10b981" stroke-width="3"/><text x="450" y="346" text-anchor="middle" class="h" fill="#047857">② 故障样本足够吗？</text><path d="M375 368V400H190M525 368V400H710" fill="none" stroke="#94a3b8" stroke-width="3" marker-end="url(#a)"/><text x="275" y="392" class="tag" fill="#047857">足够</text><text x="620" y="392" class="tag" fill="#b91c1c">很少</text><rect x="65" y="410" width="250" height="58" rx="18" fill="#ecfdf5" stroke="#10b981" stroke-width="2"/><text x="190" y="446" text-anchor="middle" class="h" fill="#047857">LSTM / Transformer</text><rect x="585" y="410" width="250" height="58" rx="18" fill="#fff1f2" stroke="#ef4444" stroke-width="2"/><text x="710" y="446" text-anchor="middle" class="h" fill="#b91c1c">异常检测：AE / VAE</text><text x="450" y="490" text-anchor="middle" class="b">最后补问：要实时就做轻量边缘部署；要解释就选树模型 + SHAP。</text></svg>
